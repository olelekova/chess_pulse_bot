      Deshmukh:    { ru: "Дешмук", gender: f }
      Vaishali:    { ru: "Вайшали", gender: f }
      Rameshbabu:  { ru: "Вайшали", gender: f }    # альтернативный вариант фамилии в PGN


  # ─── TePe Sigeman & Co Chess Tournament 2026 ─────────────────────────
  # 31-й розыгрыш, Мальмё, Elite Plaza Hotel, 1–7 мая 2026.
  # 8 игроков, круговой турнир в один круг (round-robin), классика 90+30/40 +30
  # Туры 1–6 в 15:00 CEST = 13:00 UTC, последний (тур 7) в 12:00 CEST = 10:00 UTC.
  tepe_sigeman_2026:
    active:        true
    display_name:  "TePe Sigeman & Co 2026"
    short_name:    "Sigeman"
    hashtag:       "#tepe_sigeman"
    emoji:         "🇸🇪"
    qualifies_for: ""                    # супер-турнир без квалификации
    start_date:    "2026-05-01"
    end_date:      "2026-05-07"
    total_rounds:  7
    rest_days:     []                    # без выходных, играют каждый день

    lichess:
      broadcast_id: "1X75mYa7"
      autodiscover_rounds: true
      round_ids:
        - ["ELr1KMpn", "Round 1"]
        - ["4Uwzk4as", "Round 2"]
        - ["zSwXjRLX", "Round 3"]
        - ["qQLhISkG", "Round 4"]
        - ["mMrsVH3S", "Round 5"]
        - ["PXk4j6f7", "Round 6"]
        - ["swuu8ywu", "Round 7"]

    # Lazy-scroll профиль: лента читабельна с одного пролистывания.
    # Цель: ~5–6 постов на тур.
    #   1. preview перед туром
    #   2. 0–2 eval_swing на громких swing-ах (threshold=2.0, cooldown=10 ходов)
