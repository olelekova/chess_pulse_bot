# ═══════════════════════════════════════════════════════════════════════
# tournaments.yaml — конфигурация всех турниров для chess bot
# ═══════════════════════════════════════════════════════════════════════
#
# Как добавить новый турнир:
#   1. Скопируй блок _template ниже под именем нового турнира.
#   2. Заполни broadcast_id (с lichess.org/broadcast/...).
#   3. Поставь start_date / end_date — бот сам активирует профиль в эти даты.
#   4. Включи нужные алгоритмы (true / false) в секции algorithms.
#   5. Заполни players (фамилия из PGN → русское имя).
#   6. Закоммить и задеплой. Никакого Python-кода править не нужно.
#
# Поведение:
#   - Активным считается профиль, у которого active: true И сегодняшняя дата
#     лежит в [start_date, end_date]. Бот опрашивает все активные профили.
#   - Можно держать несколько турниров одновременно (мужской + женский + новый).
#   - Шаблоны (имена, начинающиеся с "_") бот игнорирует.
#
# Параметры алгоритмов (числовые пороги) — в секции params каждого профиля.
# Если не указаны — берутся defaults (см. ниже).
# ═══════════════════════════════════════════════════════════════════════


# ─── Глобальные значения по умолчанию ──────────────────────────────────
defaults:
  poll_interval_seconds: 300        # как часто опрашивать Lichess (5 мин)
  eval_swing_threshold:  1.2        # резкая смена оценки в пешках
  novelty_move_threshold: 15        # сигнал, если дебют кончился до этого хода
  opening_status_delay:  900        # задержка перед 15-мин дебютным анализом (сек)
  pulse_intervals:       [3600, 7200, 10800]  # 1ч, 2ч, 3ч
  pulse_labels:
    3600:  "1 час"
    7200:  "2 часа"
    10800: "3 часа"
  tiebreak_rules: ["playoff_first", "sb", "wins", "h2h"]
  round_start_utc: "12:30"          # 15:30 Кипр / Москва, 13:30 Лиссабон


# ─── Описание алгоритмов (для справки и для UI) ────────────────────────
# Каждый профиль ниже включает/выключает любой из этих ключей.
algorithm_catalog:
  preview:
    title: "Превью тура"
    when:  "за час до старта тура"
    why:   "анонс пар, контекст, история встреч"
  new_game:
    title: "Старт каждой партии"
    when:  "при первом обнаружении партии"
    why:   "отдельный пост с дебютом и ожиданиями"
  pulse:
    title: "Пульс-апдейт"
    when:  "через 1ч / 2ч / 3ч после старта партии"
    why:   "оценка + что произошло за последний отрезок"
    params: [pulse_intervals]
  eval_swing:
    title: "Резкая смена оценки"
    when:  "когда |Δeval| ≥ threshold между апдейтами"
    why:   "ключевые ошибки и тактические удары"
    params: [eval_swing_threshold]
  opening_15min:
    title: "15-мин дебютный анализ"
    when:  "через 15 минут после старта"
    why:   "оценка дебютного выбора, новинки"
    params: [opening_status_delay, novelty_move_threshold]
  turning_point:
    title: "Переломный момент партии"
    when:  "после окончания каждой партии"
    why:   "разбор ключевого момента с диаграммой"
  round_summary:
    title: "Итоги тура + турнирная таблица"
    when:  "после окончания всех партий тура"
    why:   "результаты + текущие позиции в таблице"
  final_standings_with_places:
    title: "Финальные места (1, 2, 3...)"
    when:  "только в итогах последнего тура"
    why:   "победитель + распределение мест с тай-брейками"
  game_over_post:
    title: "Пост на окончание партии"
    when:  "сразу как партия завершилась"
    why:   "счёт, краткий итог, ссылка на партию"
  hourly_recap:
    title: "Часовой обзор по всему туру"
    when:  "каждый круглый час, пока идёт тур"
    why:   "сводка по всем партиям одновременно (новый алгоритм, пока выкл.)"


# ═══════════════════════════════════════════════════════════════════════
