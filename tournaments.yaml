      new_game:                    false
      pulse:                       false
      eval_swing:                  true     # только на серьёзных свингах
      opening_15min:               false
      turning_point:               true     # = разбор ОДНОЙ лучшей партии тура
      round_summary:               true
      game_over_post:              false    # → батчем в round_summary
      final_standings_with_places: true
      hourly_recap:                false

    params:
      pulse_intervals: []
      eval_swing_threshold: 2.0       # выше старого 1.5 — режем шум переколебаний
