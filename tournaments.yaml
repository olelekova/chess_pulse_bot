  # и заполни поля. Удалять _template не нужно — бот игнорирует имена с "_".
  _template:
    active:        false
    display_name:  "Название турнира"   # как показывать в постах
    emoji:         "♟️"
    qualifies_for: ""                    # "выход в Кандидаты-2027" или пусто
    start_date:    "YYYY-MM-DD"
    end_date:      "YYYY-MM-DD"
    total_rounds:  9
    rest_days:     []                    # ["YYYY-MM-DD", ...] или []

    lichess:
      broadcast_id: ""                   # из URL lichess.org/broadcast/.../{ID}
      round_ids:    []                   # [["roundId", "Round 1"], ...]
      autodiscover_rounds: true          # бот сам подтянет раунды по broadcast

    # ВЫБЕРИ свой профиль апдейтов:
    #   - "full"     — всё включено (как женский Кандидатов)
    #   - "light"    — только превью + переломы + итоги (как мужской)
    #   - "minimal"  — только итоги тура и финальные места
    # Можно мешать вручную — просто перезапиши флаги ниже.
    algorithms:
      preview:                     true
      new_game:                    false
      pulse:                       false
      eval_swing:                  false
      opening_15min:               false
      turning_point:               true
      round_summary:               true
      game_over_post:              true
      final_standings_with_places: true
      hourly_recap:                false

    params:
      pulse_intervals: []
      # eval_swing_threshold: 1.2        # переопределить порог
      # opening_status_delay: 900        # переопределить задержку

    # Фамилия из PGN → русское имя (+ опционально chess.com username для репертуара)
    players: {}


# ═══════════════════════════════════════════════════════════════════════
# ПРЕСЕТЫ — для быстрого старта нового турнира
# ═══════════════════════════════════════════════════════════════════════
# Используй python tournaments_config.py --apply-preset <preset> <tournament_id>
# чтобы залить пресет в существующий профиль.
presets:
  full:        # женский стиль
    preview: true
    new_game: true
    pulse: true
    eval_swing: true
    opening_15min: true
    turning_point: true
    round_summary: true
    game_over_post: true
    final_standings_with_places: true
    hourly_recap: false

  light:       # мужской стиль (минимум спама)
    preview: true
    new_game: false
    pulse: false
    eval_swing: false
    opening_15min: false
    turning_point: true
    round_summary: true
    game_over_post: true
    final_standings_with_places: true
    hourly_recap: false

  minimal:    # только итоги
    preview: false
    new_game: false
    pulse: false
    eval_swing: false
    opening_15min: false
    turning_point: false
    round_summary: true
    game_over_post: false
    final_standings_with_places: true
    hourly_recap: false

  hourly:     # экспериментальный — часовой digest по всему туру
    preview: true
    new_game: false
    pulse: false
    eval_swing: true
    opening_15min: false
    turning_point: true
    round_summary: true
    game_over_post: true
    final_standings_with_places: true
    hourly_recap: true
