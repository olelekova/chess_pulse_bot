      Abdusattorov:  { ru: "Абдусатторов", chess_com: "chesswarrior7197" }
      Erigaisi:      { ru: "Эригайси",  chess_com: "ghandeevam2003" }
      Foreest:       { ru: "Ван Форест" }
      "Van Foreest": { ru: "Ван Форест" }   # альтернативное написание в PGN
      Erdogmus:      { ru: "Эрдогмуш" }
      Grandelius:    { ru: "Гранделиус", chess_com: "nilsgrandelius" }
      Woodward:      { ru: "Вудворд" }
      Zhu:           { ru: "Чжу Цзиньэр", gender: f }   # единственная женщина в составе


